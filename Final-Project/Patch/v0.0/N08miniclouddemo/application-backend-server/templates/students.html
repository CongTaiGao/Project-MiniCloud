<!DOCTYPE html>
<html>
<head>
    <title>Student List</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            padding: 40px;
        }

        table {
            border-collapse: collapse;
            width: 70%;
            margin: auto;
            background: white;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #4CAF50;
            color: white;
            padding: 15px;
        }

        td {
            padding: 12px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #ddd;
        }

        h1 {
            text-align: center;
        }
    </style>
</head>

<body>

<h1>Student List</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Major</th>
        <th>GPA</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{ s.id }}</td> 
        <td>{{ s.name }}</td>
        <td>{{ s.major }}</td>
        <td>{{ s.gpa }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
